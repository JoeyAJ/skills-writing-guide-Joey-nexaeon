              {tabs.map((tab) => {
                const Icon = tab.icon;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    className={`flex items-center gap-2 px-6 py-4 text-sm font-semibold transition-colors whitespace-nowrap border-b-2 ${
                      activeTab === tab.id
                        ? 'border-blue-600 text-blue-600'
                        : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    <Icon size={18} />
                    {tab.label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Main Content Area */}
          <main className="max-w-6xl mx-auto p-6 md:p-8">
            {activeTab === 'summary' && <SummaryView t={t} />}
            {activeTab === 'swot' && <SwotView t={t} />}
            {activeTab === 'competency' && <CompetencyView t={t} />}
            {activeTab === 'strategy' && <StrategyView t={t} />}
            {activeTab === 'references' && <ReferencesView t={t} />}
          </main>
        </div>
      );
    }

    // 將 React App 渲染到 HTML 的 root 元素中
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
