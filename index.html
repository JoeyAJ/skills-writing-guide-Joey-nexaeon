            'bg-white text-slate-700 border-slate-200'

      ))}
    </div>
  );
}

                  <div className="mt-3 text-xs text-red-500 leading-relaxed">
                    ⚠️ {lang==='zh'?'Claude 不知道什麼時候要觸發這個 Skill！':'Claude가 언제 이 Skill을 써야 할지 몰라요!'}

                </div>
                <div className="bg-green-50 rounded-2xl p-5 border border-green-200">
                  <div className="text-sm font-black text-green-700 mb-3">{t.write.example.good.label}</div>

            <div className="bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-3xl p-7 shadow-lg">

              <p className="text-indigo-100 leading-relaxed">{t.write.key.text}</p>

          </div>

        {/* TAB 2: How to install */}
        {tab===2 && (

              {t.install.steps.map((s,i)=>(
                <div key={i} className="step-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 text-center">
                  <div className="text-4xl mb-3">{s.icon}</div>

            {/* UI Mockups */}

              <h2 className="text-xl font-black text-slate-800 mb-6">{t.install.mockTitle}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">

                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">

                  </div>
                  <MockClaude1 lang={lang}/>
                </div>
                <div>
                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
                    <span className="w-6 h-6 bg-indigo-600 text-white rounded-full text-xs flex items-center justify-center font-black">2</span>
                    {t.install.mock.step2title}
                  </div>
                  <MockClaude2 lang={lang}/>
                </div>
                <div>
                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
                    <span className="w-6 h-6 bg-orange-500 text-white rounded-full text-xs flex items-center justify-center font-black">3</span>
                    {t.install.mock.step3title}
                  </div>
                  <MockClaude3 lang={lang}/>
                </div>
                <div>
                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
                    <span className="w-6 h-6 bg-teal-600 text-white rounded-full text-xs flex items-center justify-center font-black">4</span>
                    {t.install.mock.step4title}
                  </div>
                  <MockClaude4 lang={lang}/>
                </div>
              </div>
            </div>

            {/* Check */}
            <div className="bg-teal-50 border border-teal-200 rounded-3xl p-6">
              <h3 className="font-black text-teal-700 mb-2">{t.install.check.title}</h3>
              <p className="text-teal-800 text-sm leading-relaxed">{t.install.check.text}</p>

          </div>

        {/* TAB 3: How to use */}
        {tab===3 && (
          <div className="space-y-8">
            <div className="bg-pink-50 border border-pink-200 rounded-3xl p-6">
              <p className="text-pink-800 font-bold text-lg">{t.use.intro}</p>
            </div>

            {/* Flow chart */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
              <h2 className="text-xl font-black text-slate-800 mb-6">{t.use.flow.title}</h2>
              <FlowChart steps={t.use.flow.steps} lang={lang}/>
            </div>

            {/* Manual trigger */}
            <div className="bg-indigo-50 border border-indigo-200 rounded-3xl p-6">
              <h3 className="font-black text-indigo-700 mb-3">{t.use.manual.title}</h3>
              <div className="space-y-2">
                {t.use.manual.text.split('\n').map((line,i)=>(
                  <p key={i} className={`text-sm leading-relaxed ${line.startsWith('"')||line.startsWith('"')?'text-indigo-800 font-mono bg-white rounded-lg px-3 py-2 border border-indigo-100':line===''?'hidden':'text-indigo-700'}`}>
                    {line}
                  </p>
                ))}
              </div>
            </div>

            {/* FAQ */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
              <h2 className="text-xl font-black text-slate-800 mb-5">
                {lang==='zh'?'常見問題':'자주 묻는 질문'}
              </h2>
              <div className="space-y-4">
                {t.use.faq.map((faq,i)=>(
                  <div key={i} className="bg-slate-50 rounded-2xl p-5 border border-slate-100">
                    <p className="font-black text-slate-800 text-sm mb-2">{faq.q}</p>
                    <p className="text-sm text-slate-600 leading-relaxed">{faq.a}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Shortcut */}
            <div className="bg-gradient-to-br from-indigo-700 to-purple-700 text-white rounded-3xl p-8 shadow-xl">
              <h3 className="font-black text-xl mb-3">{t.use.shortcut.title}</h3>
              <p className="text-indigo-200 mb-4">{t.use.shortcut.text}</p>
              <div className="bg-white/15 rounded-2xl p-5 mb-5 font-mono text-sm text-indigo-100 leading-relaxed whitespace-pre-wrap border border-white/20">
                {t.use.shortcut.example}
              </div>
              <p className="text-indigo-100 text-sm leading-relaxed">{t.use.shortcut.result}</p>
            </div>
          </div>
        )}

        {/* TAB 4: Plugins */}
        {tab===4 && (
          <div className="space-y-8">

            {/* Diff intro */}
            <div className="bg-gradient-to-br from-violet-600 to-purple-700 text-white rounded-3xl p-8 shadow-lg">
              <h2 className="text-2xl font-black mb-2">{t.plugins.diffTitle}</h2>
              <p className="text-violet-100 text-xl font-bold">{t.plugins.diffText}</p>

            {/* Skills vs Plugins compare */}
            <div>
              <h2 className="text-xl font-black text-slate-800 mb-4">{lang==='zh'?'並排比較一下：':'나란히 비교해볼까요:'}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                {t.plugins.compare.map((item,i)=>(
                  <div key={i} className={`rounded-3xl p-6 border-2 ${item.color}`}>
                    <div className="text-4xl mb-3">{item.icon}</div>
                    <div className={`text-xl font-black mb-1 ${item.nameColor}`}>{item.name}</div>
                    <p className="text-sm font-semibold text-slate-700 mb-2">{item.desc}</p>
                    <div className="text-xs text-slate-500 mb-3 bg-white/60 rounded-lg px-3 py-1.5">{item.where}</div>
                    <ul className="space-y-1.5">
                      {item.items.map((pt,j)=>(
                        <li key={j} className="flex items-center gap-2 text-sm text-slate-600">
                          <span className={i===0?'text-blue-400':'text-violet-400'}>✓</span>{pt}
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
            </div>

            {/* Analogy */}
            <div className="bg-amber-50 border border-amber-200 rounded-3xl p-7">
              <h3 className="font-black text-amber-800 mb-3">{t.plugins.analogyTitle}</h3>
              <p className="text-amber-900 leading-relaxed">{t.plugins.analogyText}</p>
            </div>

            {/* Where to use warning */}
            <div className="bg-red-50 border-2 border-red-200 rounded-3xl p-6 flex gap-4">
              <span className="text-3xl">⚠️</span>
              <div>
                <h3 className="font-black text-red-700 mb-2">{t.plugins.whereTitle}</h3>
                <p className="text-red-800 text-sm leading-relaxed">{t.plugins.whereText}</p>
              </div>
            </div>

            {/* Install steps */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
              <h2 className="text-xl font-black text-slate-800 mb-2">{t.plugins.installTitle}</h2>
              <p className="text-slate-500 text-sm mb-6">{t.plugins.installIntro}</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                {t.plugins.installSteps.map((s,i)=>(
                  <div key={i} className="step-card bg-violet-50 rounded-2xl p-5 border border-violet-100 text-center">
                    <div className="text-3xl mb-2">{s.icon}</div>
                    <div className="inline-block px-3 py-1 bg-violet-600 text-white text-xs font-black rounded-full mb-2">{s.num}</div>
                    <h3 className="font-black text-slate-800 text-sm mb-1">{s.title}</h3>
                    <p className="text-xs text-slate-500 leading-relaxed">{s.desc}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Cowork mockup */}
            <div>
              <h2 className="text-xl font-black text-slate-800 mb-5">{t.plugins.mockTitle}</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">

                {/* Mock: Cowork with Customize sidebar */}
                <div>
                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
                    <span className="w-6 h-6 bg-violet-600 text-white rounded-full text-xs flex items-center justify-center font-black">1</span>
                    {lang==='zh'?'切換到 Cowork 模式':'Cowork 탭으로 전환'}
                  </div>
                  <div className="mock-window">
                    <div className="mock-titlebar">
                      <div className="mock-dot bg-red-400"/><div className="mock-dot bg-yellow-400"/><div className="mock-dot bg-green-400"/>
                      <div className="mock-url">claude.ai/cowork</div>
                    </div>
                    <div className="bg-white p-3">
                      <div className="flex gap-1 mb-3">
                        <div className="px-3 py-1.5 rounded-full text-xs text-gray-400 bg-gray-100">Chat</div>
                        <div className="highlight-box px-3 py-1.5 rounded-full text-xs font-black text-indigo-700 bg-indigo-100 relative">
                          Cowork
                          <div className="click-badge" style={{top:'-10px',right:'-40px'}}>{lang==='zh'?'點這':'클릭'}</div>
                        </div>
                        <div className="px-3 py-1.5 rounded-full text-xs text-gray-400 bg-gray-100">Code</div>
                      </div>
                      <div className="flex gap-2 min-h-[100px]">
                        <div className="w-28 bg-slate-50 rounded-xl p-2 text-xs border border-slate-100">
                          <div className="text-gray-400 text-xs mb-2">TASKS</div>
                          <div className="highlight-box py-1.5 px-2 bg-violet-50 text-violet-700 rounded-lg font-bold text-xs relative">
                            Customize
                            <div className="click-badge" style={{top:'-10px',right:'-40px'}}>{lang==='zh'?'點這':'여기'}</div>
                          </div>
                        </div>
                        <div className="flex-1 flex items-center justify-center text-gray-300 text-xs">
                          {lang==='zh'?'Cowork 工作區':'Cowork 작업 공간'}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Mock: Browse plugins */}
                <div>
                  <div className="text-sm font-bold text-slate-600 mb-3 flex items-center gap-2">
                    <span className="w-6 h-6 bg-violet-600 text-white rounded-full text-xs flex items-center justify-center font-black">2</span>
                    {lang==='zh'?'點「Browse plugins」瀏覽安裝':'Browse plugins 탐색 및 설치'}
                  </div>
                  <div className="mock-window">
                    <div className="mock-titlebar">
                      <div className="mock-dot bg-red-400"/><div className="mock-dot bg-yellow-400"/><div className="mock-dot bg-green-400"/>
                      <div className="mock-url">Plugins</div>
                    </div>
                    <div className="bg-white p-4">
                      <div className="text-xs font-black text-slate-700 mb-3">Plugins</div>
                      {[
                        { name:'Marketing', icon:'📣', installed:true },
                        { name:'Data Analysis', icon:'📊', installed:false },
                        { name:'Legal', icon:'⚖️', installed:false },
                      ].map((p,i)=>(
                        <div key={i} className="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
                          <div className="flex items-center gap-2">
                            <span>{p.icon}</span>
                            <span className="text-xs font-bold text-slate-700">{p.name}</span>
                          </div>
                          {p.installed
                            ? <span className="text-xs text-teal-600 font-black">✓ {lang==='zh'?'已安裝':'설치됨'}</span>
                            : <div className={`highlight-box text-xs px-3 py-1 rounded-full bg-violet-600 text-white font-black relative ${i===1?'':'opacity-60'}`}>
                                Install
                                {i===1 && <div className="click-badge" style={{top:'-10px',right:'-40px'}}>{lang==='zh'?'點這':'클릭'}</div>}
                              </div>
                          }
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* How to use */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
              <h2 className="text-xl font-black text-slate-800 mb-2">{t.plugins.useTitle}</h2>
              <p className="text-slate-500 text-sm mb-6">{t.plugins.useIntro}</p>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                {t.plugins.useMethods.map((m,i)=>(
                  <div key={i} className="bg-slate-50 rounded-2xl p-5 border border-slate-100 text-center">
                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center mx-auto mb-3 text-xl font-black ${i===0?'bg-blue-100 text-blue-600':i===1?'bg-violet-100 text-violet-600':'bg-teal-100 text-teal-600'}`}>{m.icon}</div>
                    <h3 className="font-black text-slate-800 text-sm mb-1">{m.title}</h3>
                    <p className="text-xs text-slate-500 leading-relaxed">{m.desc}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Official plugins */}
            <div className="bg-indigo-50 border border-indigo-200 rounded-3xl p-7">
              <h3 className="font-black text-indigo-700 mb-4">{t.plugins.official.title}</h3>
              <div className="flex flex-wrap gap-2">
                {t.plugins.official.items.map((item,i)=>(
                  <span key={i} className="px-4 py-2 bg-white border border-indigo-100 rounded-full text-sm font-bold text-indigo-700 shadow-sm">{item}</span>
                ))}
              </div>
            </div>

            {/* Summary table */}
            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8">
              <h2 className="text-xl font-black text-slate-800 mb-5">{t.plugins.summary.title}</h2>
              <div className="overflow-x-auto rounded-2xl border border-slate-200">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-slate-800 text-white">
                      <th className="text-left px-4 py-3 text-xs font-black">{lang==='zh'?'你的情況':'상황'}</th>
                      <th className="text-left px-4 py-3 text-xs font-black">{lang==='zh'?'推薦用':'추천'}</th>
                      <th className="text-left px-4 py-3 text-xs font-black">{lang==='zh'?'原因':'이유'}</th>
                    </tr>
                  </thead>
                  <tbody>
                    {t.plugins.summary.rows.map((row,i)=>(
                      <tr key={i} className={i%2===0?'bg-white':'bg-slate-50'}>
                        <td className="px-4 py-3 text-xs text-slate-600">{row.condition}</td>
                        <td className="px-4 py-3 text-xs font-black text-violet-600">{row.use}</td>
                        <td className="px-4 py-3 text-xs text-slate-500">{row.why}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

          </div>
        )}

      </div>

      <footer className="bg-slate-800 text-slate-400 text-center py-8 mt-6">
        <p className="text-sm font-black text-white mb-1">Claude Skills & Plugins {lang==='zh'?'完全圖解指南':'완전 그림 설명 가이드'}</p>
        <p className="text-xs">{lang==='zh'?'Joey (조이) 的 AI 教練 NexAeon':'Joey (조이) 의 AI 코치 NexAeon'}</p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
